schema: spec-driven

# Project context
context: |
  Tech stack: Python 3.12+, FastMCP, Pydantic, httpx, loguru, Typer, PyYAML
  Testing: pytest with markers (smoke, unit, integration, tools, pkg)
  Quality: strict mypy, ruff (line length 88), type hints required
  Domain: Domain extras for onetool-mcp, providing tool packs as standalone MCP servers

  Packages (monorepo-style, single pyproject.toml):
  - ot/: Core framework (executor, config, logging, registry, proxy, paths) — shared with onetool-mcp
  - otcommon/: Shared registry and utilities for extras
  - otutil/: onetool-util MCP server — file, excel, brave, convert, ground tool packs
  - otdev/: onetool-dev MCP server — ripgrep, web, package, db, diagram, context7 tool packs

  Optional install extras:
  - [util]: openpyxl, pymupdf, python-docx, python-pptx (otutil tools)
  - [dev]: aiofiles, sqlalchemy, playwright, context7 client (otdev tools)

  Commit scopes: tool, config, proxy, registry, deps, release, dx, docs, build, ci

  Spec scope: observable external behavior only.
  In scope: tool contracts, MCP server startup/config, error responses, CLI flags.
  Out of scope: internal implementation, refactoring tasks, developer process, testing conventions.

# Per-artifact rules
rules:
  proposal:
    - Only add delta specs for behavioral changes (new or modified observable behavior)
    - File operations, refactoring, developer process, and governance changes do NOT get delta specs
  tasks:
    - All code changes must include tests (unit or integration as appropriate)
    - Run `just check` before marking complete
  design:
    - Follow existing patterns from ot/ core and other tool packs
    - Prefer composition over inheritance
