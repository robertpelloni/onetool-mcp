[project]
name = "onetool-bench"
version = "2.2.2"
description = "Internal benchmark harness for OneTool"
requires-python = ">=3.12"
dependencies = [
    "onetool-mcp",
    "questionary>=2.1.1",
]
# openai, httpx, pydantic not listed — available transitively from onetool-mcp

[project.scripts]
bench = "bench.cli:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bench"]

[tool.uv.sources]
onetool-mcp = { workspace = true }

[tool.ruff]
target-version = "py312"
line-length = 88
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "C4", "UP", "ARG", "SIM", "TCH", "PTH", "RUF"]
ignore = ["E501", "B008", "UP047"]

[tool.ruff.lint.isort]
known-first-party = ["bench", "ot", "ottools", "onetool", "otdev", "otutil"]

[tool.ruff.lint.per-file-ignores]
"src/bench/*.py" = ["TC001", "TCH003"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_ignores = true
files = ["src/bench"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
asyncio_mode = "auto"
markers = [
    "smoke: <1s each",
    "unit: <1s each, no I/O",
    "integration: end-to-end",
    "bench: benchmark harness tests",
]
