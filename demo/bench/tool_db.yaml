# Tool Demo: Database Tool
#
# Demonstrates OneTool database capabilities:
# - Table listing
# - Schema inspection
# - Query execution
# - Parameterised queries
#
# Uses the Northwind sample database at demo/data/northwind.db.
#
# Use with: bench run demo/bench/tool_db.yaml

defaults:
  timeout: 60
  model: google/gemini-3-flash-preview

evaluators:
  has_tables:
    regex: "(Customers|Products|Orders|Employees)"
    expect_match: true

  has_schema:
    regex: "(TEXT|INTEGER|VARCHAR|PRIMARY)"
    expect_match: true

  has_data:
    regex: "(?i)(row|result|customer|product|country|germany|company|contact)"
    expect_match: true

servers:
  onetool:
    type: stdio
    command: uv
    args: ["run", "onetool", "--config", "${DEMO_DIR}/.onetool/onetool.yaml", "--secrets", "${DEMO_DIR}/.onetool/secrets.yaml"]
    env:
      OT_CWD: ${DEMO_DIR}

scenarios:
  - name: "Database Demo"
    description: Demonstrate OneTool database capabilities
    tasks:
      - name: "tool:db:tables"
        server: onetool
        tags: [demo, tool, db]
        evaluate: has_tables
        prompt: |
          >>> db.tables(db_url="sqlite:///data/northwind.db")
          Return the list of tables.

      - name: "tool:db:schema"
        server: onetool
        tags: [demo, tool, db]
        evaluate: has_schema
        prompt: |
          >>> db.schema(table_names=["Customers", "Products"], db_url="sqlite:///data/northwind.db")
          Describe the schema structure.

      - name: "tool:db:query"
        server: onetool
        tags: [demo, tool, db]
        evaluate: has_data
        prompt: |
          >>> db.query(sql="SELECT * FROM Customers LIMIT 5", db_url="sqlite:///data/northwind.db")
          Summarise the query results.

      - name: "tool:db:query_params"
        server: onetool
        tags: [demo, tool, db]
        evaluate: has_data
        prompt: |
          >>> db.query(sql="SELECT * FROM Customers WHERE Country = :country", db_url="sqlite:///data/northwind.db", params={"country": "Germany"})
          Summarise the query results.
