# Token Cost Benchmark
#
# Measures the context token cost of each covered MCP server's tool definitions.
# Each task loads a single server and sends a minimal prompt. The `base_context`
# column in the CSV output shows how many tokens that server's tools consume.
#
# Results feed into the token_cost fields in docs/learn/onetool-vs.yaml.
#
# Use with: bench run demo/bench/bench-token-cost.yaml

defaults:
  timeout: 60
  model: anthropic/claude-haiku-4.5

evaluators:
  any_response:
    expected: [{regex: "(?i)ok"}]

scenarios:
  - name: "Token cost per server"
    description: Measure context token cost of each covered MCP server's tool definitions
    tasks:
      - name: "cost:onetool"
        server: onetool
        tags: [token-cost]
        evaluate: any_response
        prompt: Say "ok".

      - name: "cost:package-version"
        server: package-version
        tags: [token-cost]
        evaluate: any_response
        prompt: Say "ok".

      - name: "cost:playwright"
        server: playwright
        tags: [token-cost]
        evaluate: any_response
        prompt: Say "ok".

      - name: "cost:mcp-playwright"
        server: mcp-playwright
        tags: [token-cost]
        evaluate: any_response
        prompt: Say "ok".

      - name: "cost:playwriter"
        server: playwriter
        tags: [token-cost]
        evaluate: any_response
        prompt: Say "ok".

      - name: "cost:chrome-devtools"
        server: chrome-devtools
        tags: [token-cost]
        evaluate: any_response
        prompt: Say "ok".

      - name: "cost:filesystem"
        server: filesystem
        tags: [token-cost]
        evaluate: any_response
        prompt: Say "ok".

      - name: "cost:fetch"
        server: fetch
        tags: [token-cost]
        evaluate: any_response
        prompt: Say "ok".

      - name: "cost:web-research"
        server: web-research
        tags: [token-cost]
        evaluate: any_response
        prompt: Say "ok".

      - name: "cost:context7"
        server: context7
        tags: [token-cost]
        evaluate: any_response
        prompt: Say "ok".

      - name: "cost:github"
        server: github
        tags: [token-cost]
        evaluate: any_response
        prompt: Say "ok".

      - name: "cost:git"
        server: git
        tags: [token-cost]
        evaluate: any_response
        prompt: Say "ok".

      - name: "cost:memory"
        server: memory
        tags: [token-cost]
        evaluate: any_response
        prompt: Say "ok".

      - name: "cost:universal-db"
        server: universal-db
        tags: [token-cost]
        evaluate: any_response
        prompt: Say "ok".

      - name: "cost:supabase"
        server: supabase
        tags: [token-cost]
        evaluate: any_response
        prompt: Say "ok".

      - name: "cost:chunkhound"
        server: chunkhound
        tags: [token-cost]
        evaluate: any_response
        prompt: Say "ok".

      - name: "cost:kroki"
        server: kroki
        tags: [token-cost]
        evaluate: any_response
        prompt: Say "ok".

      - name: "cost:aws"
        server: aws
        tags: [token-cost]
        evaluate: any_response
        prompt: Say "ok".


servers:
  onetool:
    type: stdio
    command: uv
    args: ["run", "onetool", "--config", "${DEMO_DIR}/.onetool/onetool.yaml", "--secrets", "${DEMO_DIR}/.onetool/secrets.yaml"]
    env:
      OT_CWD: ${DEMO_DIR}

  package-version:
    type: stdio
    command: npx
    args: ["-y", "mcp-package-version@0.1.17"]

  playwright:
    type: stdio
    command: npx
    args: ["-y", "@playwright/mcp"]

  mcp-playwright:
    type: stdio
    command: npx
    args: ["-y", "mcp-playwright"]

  playwriter:
    type: stdio
    command: npx
    args: ["-y", "playwriter"]

  chrome-devtools:
    type: stdio
    command: npx
    args: ["-y", "chrome-devtools-mcp"]

  filesystem:
    type: stdio
    command: npx
    args: ["-y", "@modelcontextprotocol/server-filesystem", "."]

  fetch:
    type: stdio
    command: uvx
    args: ["mcp-server-fetch"]

  web-research:
    type: stdio
    command: npx
    args: ["-y", "@mzxrai/mcp-webresearch"]

  context7:
    type: http
    url: https://mcp.context7.com/mcp
    headers:
      CONTEXT7_API_KEY: ${B_CONTEXT7_API_KEY}

  github:
    type: http
    url: https://api.githubcopilot.com/mcp/
    headers:
      Authorization: "Bearer ${B_GITHUB_TOKEN}"
      Accept: "application/json, text/event-stream"
    timeout: 120

  git:
    type: stdio
    command: uvx
    args: ["mcp-server-git", "--repository", "${DEMO_DIR}/.."]

  memory:
    type: stdio
    command: npx
    args: ["-y", "@modelcontextprotocol/server-memory"]

  universal-db:
    type: stdio
    command: npx
    args: ["-y", "universal-db-mcp", "--type", "sqlite", "--file", "${DEMO_DIR}/../tests/data/northwind.db"]

  supabase:
    type: stdio
    command: npx
    args: ["-y", "@supabase/mcp-server-supabase@latest", "--project-ref=${B_SUPABASE_PROJECT_REF}", "--access-token=${B_SUPABASE_ACCESS_TOKEN}"]

  chunkhound:
    type: stdio
    command: chunkhound
    args: ["mcp"]
    timeout: 30
    inherit_env: true

  kroki:
    type: stdio
    command: npx
    args: ["-y", "kroki-mcp"]

  aws:
    type: stdio
    command: uvx
    args: ["mcp-proxy-for-aws", "https://aws-mcp.us-east-1.api.aws/mcp"]
    env:
      AWS_ACCESS_KEY_ID: ${B_AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${B_AWS_SECRET_ACCESS_KEY}
      AWS_REGION: us-east-1
    timeout: 60
