# OneTool Test Configuration
# Isolated config for pytest — uses flat layout (version 2)
version: 2

# Include security config from project template (path relative to this file's parent)
include:
  - ../../src/ot/config/global_templates/security.yaml

# Tools dir: relative to this file's parent (tests/.onetool/)
tools_dir:
  - ../../src/ottools/*.py

log_level: INFO

# MCP servers for browser integration tests (whiteboard, play_util, chrome_util)
servers:
  playwright:
    type: stdio
    command: npx
    args: ["@playwright/mcp@latest"]
    timeout: 120
    enabled: true

  chrome_devtools:
    type: stdio
    command: npx
    args: ["-y", "chrome-devtools-mcp@latest", "--isolated", "--viewport=1280x720", "--no-usage-statistics"]
    timeout: 120
    enabled: true

# Override: disable sanitization for tests (test_sanitize.py tests it explicitly)
security:
  sanitize:
    enabled: false

llm:
  model: google/gemini-3-flash-preview
  base_url: https://openrouter.ai/api/v1

tools: {}
