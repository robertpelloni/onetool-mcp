# OneTool Test Configuration
# Uses inherit: none to isolate tests from user's global config
version: 1
inherit: none

# Include security config (full allowlist)
# Path is relative to OT_DIR (.onetool/)
include:
  - config/security.yaml

# Use default tools_dir (src/ot_tools/*.py) for testing
tools_dir:
  - src/ot_tools/*.py

log_level: INFO
