# OneTool Test Configuration
# Uses inherit: none to isolate tests from user's global config
version: 1
inherit: none

# Include security config from global template (single source of truth)
# Path is relative to OT_DIR (tests/.onetool/), resolves to project root's template
include:
  - ../../.onetool-global/config/security.yaml

# Use default tools_dir (src/ot_tools/*.py) for testing
tools_dir:
  - src/ot_tools/*.py

log_level: INFO

# Override: disable sanitization for tests (test_sanitize.py tests it explicitly)
security:
  sanitize:
    enabled: false
