# OneTool Shared Server Definitions
# Load via: include: [config/servers.yaml]
#
# These are common MCP server configurations that can be included
# in project-specific onetool.yaml files.
#
# Full setup guides: https://onetool.beycom.online/reference/servers/

servers:

  # =============================================================================
  # CHROME DEVTOOLS MCP
  # =============================================================================
  # Browser automation, debugging, and inspection via Chrome DevTools Protocol.
  # Source: https://github.com/ChromeDevTools/chrome-devtools-mcp
  # Guide:  https://onetool.beycom.online/reference/servers/chrome-devtools/
  #
  chrome-devtools:
    type: stdio
    command: npx
    args:
      - "-y"
      - "chrome-devtools-mcp@latest"
      - "--isolated"            # Temporary profile, auto-cleaned
      - "--viewport=1280x720"   # Consistent window size
      - "--no-usage-statistics" # Disable data collection
    timeout: 120  
    enabled: false

  # =============================================================================
  # MULTI-INSTANCE EXAMPLE
  # =============================================================================
  # You can run multiple named instances of the same server binary.
  # Useful for having one browser session per task, or mixing connection modes.
  #
  # chrome-devtools-isolated:
  #   type: stdio
  #   command: npx
  #   args: ["-y", "chrome-devtools-mcp@latest", "--isolated", "--viewport=1280x720"]
  #   timeout: 120
  #   enabled: false  # Enable with: ot.server(enable="chrome-devtools-isolated")
  #
  # chrome-devtools-auto:
  #   type: stdio
  #   command: npx
  #   args: ["-y", "chrome-devtools-mcp@latest", "--autoConnect", "--channel=beta"]
  #   timeout: 120
  #   enabled: false  # Enable with: ot.server(enable="chrome-devtools-auto")


  # =============================================================================
  # PLAYWRIGHT MCP
  # =============================================================================
  # Browser automation via Playwright accessibility tree (no vision needed).
  # Source: https://github.com/microsoft/playwright-mcp
  # Guide:  https://onetool.beycom.online/reference/servers/playwright/
  #
  playwright:
    type: stdio
    command: npx
    args:
      - "@playwright/mcp@latest"
    timeout: 120
    enabled: false

  # =============================================================================
  # GITHUB MCP (HTTP)
  # =============================================================================
  # GitHub's official MCP server for repos, issues, PRs, Actions, and more.
  # Source: https://github.com/github/github-mcp-server
  # Guide:  https://onetool.beycom.online/reference/servers/github/
  #
  # SETUP:
  #   Add GITHUB_TOKEN to ~/.onetool/secrets.yaml before enabling.
  #
  github:
    type: http
    url: https://api.githubcopilot.com/mcp/
    headers:
      Authorization: "Bearer ${GITHUB_TOKEN}"
      Accept: "application/json, text/event-stream"
    timeout: 120
    enabled: false

  # =============================================================================
  # CHUNKHOUND MCP
  # =============================================================================
  # Regex and semantic code search for large codebases.
  # Source: https://github.com/casualjim/chunkhound
  # Guide:  https://onetool.beycom.online/reference/servers/chunkhound/
  #
  # SETUP:
  #   pip install chunkhound && chunkhound index   (run from project root)
  #
  chunkhound:
    type: stdio
    command: chunkhound
    args:
      - "mcp"
    timeout: 30
    inherit_env: true  # Required: passes CHUNKHOUND_EMBEDDING__API_KEY set during indexing
    enabled: false

