name: Docs Check

on:
  pull_request:
    paths:
      - docs/**
      - src/**
      - scripts/check_docs_registry.py
      - scripts/sync_docs_generated.py
      - mkdocs.yml
      - justfile
      - uv.lock
      - pyproject.toml
  push:
    branches: [main]
    paths:
      - docs/**
      - src/**
      - scripts/check_docs_registry.py
      - scripts/sync_docs_generated.py
      - mkdocs.yml
      - justfile
      - uv.lock
      - pyproject.toml

jobs:
  validate-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --group dev --all-extras

      - name: Build docs (strict)
        run: uv run mkdocs build --strict

      - name: Check generated pack summaries
        run: |
          uv run python scripts/sync_docs_generated.py
          git diff --exit-code -- docs/llms.txt docs/reference/tools/whiteboard.md

      - name: Check docs registry counts
        run: uv run python scripts/check_docs_registry.py
