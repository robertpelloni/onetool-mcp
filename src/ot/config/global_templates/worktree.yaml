# Worktree tool configuration
# Manages isolated git worktrees for parallel agents (trunk mode).
# See: worktree.init(), worktree.add(), worktree.info(), worktree.checkout(), worktree.commit()

tools:
  worktree:
    # Directory for new worktrees — {task_id}, {base_dir}, {repo} available
    workspace_dir: "../{repo}-work/{task_id}"

    # Branch name for the git worktree — defaults to task_id
    # Use a prefix to namespace branches: "wt/{task_id}"
    branch_name: "{task_id}"

    # Command returned by worktree.add() to start a worker session
    launch_cmd: "cd {workspace_dir}"

    # First __ot tool call the worker agent should run after starting
    ot_cmd: "worktree.info()"

    # Shell commands run after git worktree add.
    # Variables: {base_dir}, {workspace_dir}, {task_id}, {repo}
    prepare: []
    #  - "cp {base_dir}/.env {workspace_dir}/.env"
    #  - "cd {workspace_dir} && uv sync"

    # Conventional commit conventions for worktree.message()
    commit:
      types:
        - feat
        - fix
        - refactor
        - perf
        - docs
        - test
        - build
        - ci
        - chore
        - style
        - revert
      scopes: []
      # scopes:
      #   - component-a
      #   - component-b
      #   - component-c
