# OneTool Default Snippets Library
# Load via: include: [config/snippets.yaml]

snippets:

  # ============================================================================
  # BRAVE SEARCH (br)
  # ============================================================================

  br:
    description: Batch search using Brave (pipe-separated queries)
    params:
      q: { description: "Pipe-separated search queries" }
      count: { default: 10, description: "Results per query" }
    body: |
      __format__="yml_h";__sanitize__=False
      {% set _qs = q.split('|') | map('trim') | list %}
      br.search_batch(queries=[{% for item in _qs %}"{{ item }}"{% if not loop.last %}, {% endif %}{% endfor %}], count={{ count }})


  # ============================================================================
  # CONTEXT7 DOCS (c7)
  # ============================================================================

  c7:
    description: Fetch library documentation with optional semantic query
    params:
      lib: { description: "Library ID (e.g., '/vercel/next.js', 'react', 'nextjs')" }
      q: { default: "", description: "Natural language question for semantic reranking (e.g., 'How do I configure middleware?')" }
    body: |
      __format__="yml_h";__sanitize__=False
      c7.doc(library_id="{{ lib }}", query="{{ q }}")

  # ============================================================================
  # GROUND SEARCH (g)
  # ============================================================================

  g:
    description: Batch search using Gemini grounding (pipe-separated queries)
    params:
      q: { description: "Pipe-separated search queries" }
      tech: { default: "", description: "Technology stack context" }
      focus: { default: "general", description: "Focus mode: general, code, documentation, troubleshooting" }
    body: |
      __format__="yml_h";__sanitize__=False
      {% set _qs = q.split('|') | map('trim') | list %}
      g.search_batch(queries=[{% for item in _qs %}"{{ item }}"{% if not loop.last %}, {% endif %}{% endfor %}], context="{{ tech }}", focus="{{ focus }}")

  # ============================================================================
  # TAVILY SEARCH (tav)
  # ============================================================================

  tav:
    description: Search using Tavily AI (pipe-separated queries)
    params:
      q: { description: "Pipe-separated search queries" }
      depth: { default: "basic", description: "Search depth: basic or advanced" }
      count: { default: 5, description: "Max results per query" }
    body: |
      __format__="yml_h";__sanitize__=False
      {% set _qs = q.split('|') | map('trim') | list %}
      tav.search_batch(queries=[{% for item in _qs %}"{{ item }}"{% if not loop.last %}, {% endif %}{% endfor %}], max_results={{ count }}, search_depth="{{ depth }}")

  tav_x:
    description: Extract clean content from one or more URLs via Tavily (pipe-separate multiple)
    params:
      url: { description: "URL, or pipe-separated URLs to extract" }
      depth: { default: "basic", description: "Extraction depth: basic or advanced" }
    body: |
      __format__="yml_h";__sanitize__=False
      {% set _urls = url.split('|') | map('trim') | list %}
      tav.extract(urls=[{% for u in _urls %}"{{ u }}"{% if not loop.last %}, {% endif %}{% endfor %}], extract_depth="{{ depth }}")

  # ============================================================================
  # RIPGREP (rg)
  # ============================================================================

  rg:
    description: Search files with ripgrep
    params:
      p: { description: "Regex pattern to search for" }
      path: { default: ".", description: "Search path" }
      glob: { default: "", description: "File glob filter (e.g., '*.py', '*.{ts,tsx}')" }
      ft: { default: "", description: "File type filter (py, ts, js, etc.)" }
      ctx: { default: 0, description: "Lines of context before/after match" }
      count: { default: "", description: "Max matching lines to return" }
      i: { default: false, description: "Case-insensitive search" }
    body: |
      __format__="yml_h";__sanitize__=False
      rg.search(pattern="{{ p }}", path="{{ path }}"{% if glob %}, glob="{{ glob }}"{% endif %}{% if ft %}, file_type="{{ ft }}"{% endif %}{% if ctx %}, context={{ ctx }}{% endif %}{% if count %}, limit={{ count }}{% endif %}{% if i %}, case_sensitive=False{% endif %})

  rg_count:
    description: Count pattern occurrences by file
    params:
      p: { description: "Pattern to count" }
      ft: { default: "", description: "File type filter (py, ts, etc.)" }
    body: |
      __format__="yml_h";__sanitize__=False
      {% if ft %}rg.count(pattern="{{ p }}", file_type="{{ ft }}"){% else %}rg.count(pattern="{{ p }}"){% endif %}

  # ============================================================================
  # PACKAGE (pkg)
  # ============================================================================

  pkg_a:
    description: Audit project dependencies against latest registry versions
    params:
      path: { default: ".", description: "Project directory path" }
    body: |
      __format__="yml_h";__sanitize__=False
      pkg.audit(path="{{ path }}")

  pkg_npm:
    description: Check latest npm package versions
    params:
      packages: { description: "Comma-separated package names" }
    body: |
      __format__="yml_h";__sanitize__=False
      {% set _pkgs = packages.split(',') | map('trim') | list %}
      pkg.npm(packages=[{% for p in _pkgs %}"{{ p }}"{% if not loop.last %}, {% endif %}{% endfor %}])

  pkg_py:
    description: Check latest PyPI package versions
    params:
      packages: { description: "Comma-separated package names" }
    body: |
      __format__="yml_h";__sanitize__=False
      {% set _pkgs = packages.split(',') | map('trim') | list %}
      pkg.pypi(packages=[{% for p in _pkgs %}"{{ p }}"{% if not loop.last %}, {% endif %}{% endfor %}])

  pkg_m:
    description: Search OpenRouter for AI models
    params:
      q: { default: "", description: "Search term (claude, gpt-4)" }
      provider: { default: "", description: "Filter by provider" }
    body: |
      __format__="yml_h";__sanitize__=False
      pkg.models(query="{{ q }}", provider="{{ provider }}", limit=10)

  # ============================================================================
  # WEB FETCH (wf)
  # ============================================================================

  wf:
    description: Fetch one or more URLs (pipe-separate multiple)
    params:
      url: { description: "URL, or pipe-separated URLs for batch fetch" }
      format: { default: "markdown", description: "Output format: text, markdown, json" }
      links: { default: false, description: "Include hyperlinks" }
      max: { default: "", description: "Max length per URL" }
    body: |
      __format__="yml_h";__sanitize__=False
      {% set _urls = url.split('|') | map('trim') | list %}
      {% if _urls | length == 1 %}
      wf.fetch(url="{{ _urls[0] }}", output_format="{{ format }}", include_links={{ links }}{% if max %}, max_length={{ max }}{% endif %})
      {% else %}
      wf.fetch_batch(urls=[{% for u in _urls %}"{{ u }}"{% if not loop.last %}, {% endif %}{% endfor %}], output_format="{{ format }}", include_links={{ links }}{% if max %}, max_length={{ max }}{% endif %})
      {% endif %}

  wf_d:
    description: Extract structured data from a web page
    params:
      url: { description: "URL to fetch" }
      schema: { description: "What to extract (e.g., 'prices as {item, price}')" }
    body: |
      __format__="yml_h";__sanitize__=False
      content = wf.fetch(url="{{ url }}", include_tables=True)
      llm.transform(data=content, prompt="Extract {{ schema }} as YAML")

  wf_s:
    description: Fetch and summarize a web page
    params:
      url: { description: "URL to fetch" }
      focus: { default: "", description: "What to focus on" }
    body: |
      __format__="yml_h";__sanitize__=False
      content = wf.fetch(url="{{ url }}", output_format="markdown", fast=True)
      llm.transform(data=content, prompt="Summarize this page concisely{% if focus %}, focusing on {{ focus }}{% endif %}")

  # ============================================================================
  # CONVERT (cv)
  # ============================================================================

  cv:
    description: Convert documents (PDF, Word, Excel, PowerPoint) to markdown
    params:
      file: { description: "File path or glob pattern (e.g., 'docs/*.pdf', 'report.docx')" }
      output_dir: { description: "Output directory for converted files" }
    body: |
      __format__="yml_h";__sanitize__=False
      cv.auto(pattern="{{ file }}", output_dir="{{ output_dir }}")

  # ============================================================================
  # MEM (mem)
  # ============================================================================

  mem_s:
    description: Semantic or hybrid search across memories (finds related content)
    params:
      q: { description: "Search query" }
      mode: { default: "semantic", description: "Search mode: semantic, pattern, hybrid" }
      topic: { default: "", description: "Topic prefix filter (e.g., 'projects/')" }
    body: |
      __format__="yml_h";__sanitize__=False
      mem.search(query="{{ q }}", mode="{{ mode }}"{% if topic %}, topic="{{ topic }}"{% endif %})

  mem_g:
    description: Regex grep across memory content (finds exact text or patterns)
    params:
      p: { description: "Regex pattern (or literal string)" }
      topic: { default: "", description: "Topic prefix filter" }
      i: { default: false, description: "Case-insensitive search" }
    body: |
      __format__="yml_h";__sanitize__=False
      # i=True maps to case_sensitive=False (inverted param name in mem.grep)
      mem.grep(pattern="{{ p }}"{% if topic %}, topic="{{ topic }}"{% endif %}{% if i %}, case_sensitive=False{% endif %})

  mem_r:
    description: Read a memory topic by exact path
    params:
      topic: { description: "Exact topic path (e.g., 'projects/myapp/rules')" }
      meta: { default: false, description: "Include metadata header (topic, category, tags)" }
    body: |
      __format__="yml_h";__sanitize__=False
      mem.read(topic="{{ topic }}"{% if meta %}, meta=True{% endif %})

  mem_w:
    description: Write a file into memory under a topic
    params:
      topic: { description: "Topic path (e.g., 'projects/myapp/rules')" }
      file: { description: "Path to file to store" }
      category: { default: "note", description: "Category: rule, context, decision, mistake, discovery, note" }
    body: |
      __format__="yml_h";__sanitize__=False
      mem.write(topic="{{ topic }}", file="{{ file }}", category="{{ category }}")

  mem_l:
    description: List all memory topics
    params: {}
    body: |
      __format__="yml_h";__sanitize__=False
      mem.list()

  # ============================================================================
  # FILE (f)
  # ============================================================================

  f_r:
    description: Read a file, optionally from a specific line range
    params:
      path: { description: "File path" }
      offset: { default: "", description: "Start line (1-indexed)" }
      limit: { default: "", description: "Max lines to return" }
    body: |
      __format__="yml_h";__sanitize__=False
      f.read(path="{{ path }}"{% if offset %}, offset={{ offset }}{% endif %}{% if limit %}, limit={{ limit }}{% endif %})

  f_t:
    description: Show directory tree
    params:
      path: { default: ".", description: "Root directory" }
      depth: { default: 3, description: "Max depth" }
    body: |
      __format__="yml_h";__sanitize__=False
      f.tree(path="{{ path }}", max_depth={{ depth }})

  f_g:
    description: Search file contents for a pattern (no external tools required)
    params:
      p: { description: "Regex pattern" }
      path: { default: ".", description: "Root directory to search" }
      glob: { default: "", description: "File glob filter (e.g., '*.py')" }
      i: { default: false, description: "Case-insensitive search" }
    body: |
      __format__="yml_h";__sanitize__=False
      f.grep(pattern="{{ p }}", path="{{ path }}"{% if glob %}, glob="{{ glob }}"{% endif %}{% if i %}, case_sensitive=False{% endif %})

  # ============================================================================
  # GITHUB (gh)
  # ============================================================================

  gh:
    description: Search GitHub repositories and return URLs/info for multiple pages
    params:
      q: { description: "GitHub search query" }
      count: { default: 1, description: "Number of pages to fetch (30 results per page)" }
    body: |
      __format__="yml_h";__sanitize__=False
      import json
      results = []
      for page in range(1, {{ count }} + 1):
          r = github.search_repositories(query="{{ q }}", page=page, perPage=30)
          data = json.loads(r) if isinstance(r, str) else r
          for repo in data.get("items", []):
              results.append({
                  "name": repo["full_name"],
                  "url": repo["html_url"],
                  "description": repo.get("description") or "",
                  "stars": repo.get("stargazers_count", 0),
                  "updated": repo.get("updated_at", "")[:10]
              })
      {"total": len(results), "repos": results}


  # ============================================================================
  # INTERNAL TOOLS (ot)
  # ============================================================================

  reload:
    description: Reload OneTool configuration and tools
    params: {}
    body: |
      __format__="yml_h";__sanitize__=False
      ot.reload()

  status:
    description: Show system health and configuration
    params: {}
    body: |
      __format__="yml_h";__sanitize__=False
      {"health": ot.health(), "config": ot.config()}
