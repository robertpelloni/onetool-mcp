# OneTool Shared Server Definitions
# Load via: include: [config/servers.yaml]
#
# These are common MCP server configurations that can be included
# in project-specific onetool.yaml files.
#
# Full setup guides: https://onetool.beycom.online/reference/servers/

servers:

  # =============================================================================
  # CHROME DEVTOOLS MCP
  # =============================================================================
  # Browser automation and debugging via Chrome DevTools Protocol.
  chrome_devtools:
    type: stdio
    command: npx
    args:
      - "-y"
      - "chrome-devtools-mcp@latest"
      - "--isolated"            # Temporary profile, auto-cleaned
      - "--viewport=1280x720"   # Consistent window size
      - "--no-usage-statistics" # Disable data collection
    timeout: 120
    enabled: false
    description: Browser automation and debugging via Chrome DevTools Protocol
    source: https://github.com/ChromeDevTools/chrome-devtools-mcp
    instructions: |
      Workflow: navigate_page → take_screenshot → interact (click/fill) → take_screenshot
      Use wait_for before interacting with elements to ensure page load.
      evaluate_script requires function= param (a JS function string), not expression=.

  # =============================================================================
  # MULTI-INSTANCE EXAMPLE
  # =============================================================================
  # You can run multiple named instances of the same server binary.
  # Useful for having one browser session per task, or mixing connection modes.
  #
  # chrome_devtools_isolated:
  #   type: stdio
  #   command: npx
  #   args: ["-y", "chrome-devtools-mcp@latest", "--isolated", "--viewport=1280x720"]
  #   timeout: 120
  #   enabled: false  # Enable with: ot.server(enable="chrome_devtools_isolated")
  #
  # chrome_devtools_auto:
  #   type: stdio
  #   command: npx
  #   args: ["-y", "chrome-devtools-mcp@latest", "--autoConnect", "--channel=beta"]
  #   timeout: 120
  #   enabled: false  # Enable with: ot.server(enable="chrome_devtools_auto")


  # =============================================================================
  # PLAYWRIGHT MCP
  # =============================================================================
  # Browser automation via Playwright accessibility tree (no vision needed).
  playwright:
    type: stdio
    command: npx
    args:
      - "@playwright/mcp@latest"
    timeout: 120
    enabled: false
    description: Browser automation via accessibility tree (no vision needed)
    source: https://github.com/microsoft/playwright-mcp
    instructions: |
      Workflow: browser_navigate → browser_snapshot → interact → browser_snapshot
      Prefer browser_snapshot over browser_screenshot (faster, no vision needed).
      Use browser_evaluate for custom JavaScript execution.

  # =============================================================================
  # GITHUB MCP (HTTP)
  # =============================================================================
  # GitHub's official MCP server for repos, issues, PRs, Actions, and more.
  #
  # SETUP:
  #   Add GITHUB_TOKEN to ~/.onetool/secrets.yaml before enabling.
  #
  github:
    type: http
    url: https://api.githubcopilot.com/mcp/
    headers:
      Authorization: "Bearer ${GITHUB_TOKEN}"
      Accept: "application/json, text/event-stream"
    timeout: 120
    enabled: false
    description: Official GitHub API — repos, issues, PRs, Actions
    source: https://github.com/github/github-mcp-server
    instructions: |
      Requires GITHUB_TOKEN in secrets.yaml. Always specify owner and repo.
      Use list/search tools before individual gets. Search before creating issues or PRs.
      PR workflow: branch → push_files → create_pull_request.


  # =============================================================================
  # CHUNKHOUND MCP
  # =============================================================================
  # Regex and semantic code search for large codebases.
  #
  # SETUP:
  #   pip install chunkhound && chunkhound index   (run from project root)
  #
  chunkhound:
    type: stdio
    command: chunkhound
    args:
      - "mcp"
    timeout: 300
    inherit_env: true  # Required: passes CHUNKHOUND_EMBEDDING__API_KEY set during indexing
    enabled: false
    description: Regex and semantic code search for large codebases
    source: https://github.com/chunkhound/chunkhound
    instructions: |
      Must index before use: pip install chunkhound && chunkhound index (run from project root).

